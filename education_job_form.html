        <div class="col-xl-4 col-md-4 col-sm-12 mb-5">

                <option selected="selected" value="">Select City</option>
            </select>
        </div>

        <div class="col-xl-6 col-md-6 col-sm-12 mb-5">
            <label for="career_level_id" class="form-label">Career Level:</label>
            <select id="careerLevelsId" class="form-select select2-hidden-accessible" data-control="select2"
                name="career_level_id" tabindex="-1" aria-hidden="true" data-select2-id="select2-data-careerLevelsId">
                <option selected="selected" value="">Select Career Level</option>
                <option value="1">Trainee / Intern</option>

                <option value="8">Dean / Director</option>
                <option value="9">Principal / Rector</option>
            </select>

        <div class="col-xl-6 col-md-6 col-sm-12 mb-5">
            <label for="job_shift_id" class="form-label">Work Schedule:</label>
            <select id="jobShiftId" class="form-select select2-hidden-accessible" data-control="select2"
                name="job_shift_id" tabindex="-1" aria-hidden="true" data-select2-id="select2-data-jobShiftId">

                <option value="7">Online / Remote</option>
                <option value="8">As per Academic Calendar</option>

        <!-- Specializations / Keywords (renamed from Job Tag) -->
        <div class="col-xl-12 col-md-12 col-sm-12 mb-5">
            <label for="tagId" class="form-label">Specializations / Keywords:</label>
            <select class="form-select select2-hidden-accessible" id="tagId" data-control="select2" multiple=""
                name="jobTag[]" tabindex="-1" aria-hidden="true" data-select2-id="select2-data-tagId">

                <option value="2">Language Arts</option>

                <option value="11">Mentorship & Guidance</option>
                <option value="12">EdTech Integration</option>
                <option value="13">Special Education</option>
            </select>

        <div class="col-xl-6 col-md-6 col-sm-12 mb-5">
            <label for="degree_level_id" class="form-label">Required Degree Level:</label>
            <select id="requiredDegreeLevelId" class="form-select select2-hidden-accessible" data-control="select2"
                name="degree_level_id" tabindex="-1" aria-hidden="true"
                data-select2-id="select2-data-requiredDegreeLevelId">
                <option selected="selected" value="">Select Degree Level</option>
                <option value="1">Bachelor's Degree (B.A., B.Sc., B.Com, B.Tech)</option>
                <option value="2">Master's Degree (M.A., M.Sc., M.Com, M.Tech)</option>
                <option value="3">B.Ed (Bachelor of Education)</option>
                <option value="4">M.Ed (Master of Education)</option>
                <option value="5">D.Ed (Diploma in Education)</option>
                <option value="6">PGDM (Post Graduate Diploma)</option>
                <option value="7">Ph.D.</option>
                <option value="8">Professional Certifications (PGCE, TESOL, etc.)</option>
                <option value="9">Other Post-Doctoral Qualifications</option>
            </select>
        </div>

        <!-- Specific Role (renamed from Position) -->
        <div class="col-xl-6 col-md-6 col-sm-12 mb-5">
            <label for="position" class="form-label">Specific Role:</label>
            <span class="required">*</span>
            <input id="positionId" class="form-control"
                placeholder="e.g. Physics Teacher (Class XI-XII), Assistant Professor (Economics)" required=""
                maxlength="255" name="position" type="text">
        </div>

        <!-- Job Experience -->
        <div class="col-xl-6 col-md-6 col-sm-12 mb-5">
            <label for="experience" class="form-label">Job Experience (in years):</label>
            <span class="required">*</span>
            <input id="experienceId" class="form-control" placeholder="Job Experience (in years)" required="" min="0"
                max="255" onkeyup="if (/\D/g.test(this.value)) this.value = this.value.replace(/\D/g,'')"
                name="experience" type="text">
        </div>

        <!-- Hide Salary -->
        <div class="col-xl-3 col-md-3 col-sm-12 mb-5">
            <label class="form-label">Hide Salary:</label><br>
            <label class="form-check form-switch form-switch-sm float-start">
                <input type="checkbox" name="hide_salary" class="form-check-input" value="1" id="salary">
            </label>
        </div>

        <!-- Submit Buttons -->
        <div class="d-flex justify-content-end mt-5">
            <input name="saveAsDraft" type="hidden" value="" id="saveAsDraft">
            <button type="submit" name="saveDraft" class="btn btn-primary me-3 saveDraft" id="saveDraft" value="draft"
                data-loading-text="<span class='spinner-border spinner-border-sm'></span> Processing...">Save As
                Draft</button>
            <button type="submit" name="save" class="btn btn-primary me-3" id="jobsSaveBtn"
                data-loading-text="<span class='spinner-border spinner-border-sm'></span> Processing...">Save</button>
            <a href="http://127.0.0.1:8000/employer/jobs" class="btn btn-secondary me-2">Cancel</a>
        </div>
